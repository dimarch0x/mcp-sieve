# MCP Router configuration
# Downstream MCP-серверы, которые роутер будет агрегировать.
downstream:
  - name: time
    command: uvx
    args: ["mcp-server-time"]

  - name: fetch
    command: uvx
    args: ["mcp-server-fetch"]

  - name: git
    command: uvx
    args: ["mcp-server-git", "--repository", "C:\\Users\\manda\\Projects\\mcp-router"]

  - name: arxiv
    command: uvx
    args: ["arxiv-mcp-server"]

  # ponytail: Windows — npx это .cmd, MCP SDK юзает create_subprocess_exec без shell.
  # Поэтому cmd /c npx вместо просто npx.
  - name: context7
    command: cmd
    args: ["/c", "npx", "-y", "@upstash/context7-mcp@latest"]

  - name: filesystem
    command: cmd
    args: ["/c", "npx", "-y", "@modelcontextprotocol/server-filesystem", "C:\\Users\\manda\\Projects\\mcp-router"]

  - name: playwright
    command: cmd
    args: ["/c", "npx", "-y", "@playwright/mcp@latest"]

  - name: sequential-thinking
    command: cmd
    args: ["/c", "npx", "-y", "@modelcontextprotocol/server-sequential-thinking"]

  - name: memory
    command: cmd
    args: ["/c", "npx", "-y", "@modelcontextprotocol/server-memory"]

# Настройки embeddings (Ollama)
embeddings:
  ollama_url: "http://127.0.0.1:11434/api/embeddings"
  model: "nomic-embed-text"
  top_n: 10